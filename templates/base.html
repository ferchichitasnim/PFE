<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "PowerBI Narrative Backend" }}</title>
    <style>
      :root {
        --bg: #0f172a;
        --card-bg: #020617;
        --accent: #38bdf8;
        --accent-soft: #0b1120;
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --border-subtle: #1e293b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #1e293b 0, #020617 45%, #000 100%);
        color: var(--text-main);
      }

      a { color: inherit; text-decoration: none; }

      .pageShell {
        max-width: 1080px;
        margin: 32px auto 40px;
        padding: 0 20px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      header .brand {
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--accent);
      }

      header .tagline {
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .card {
        background: radial-gradient(circle at top left, #020617 0, #020617 40%, #020617 100%);
        border-radius: 18px;
        padding: 20px 22px;
        margin: 16px 0;
        border: 1px solid var(--border-subtle);
        box-shadow: 0 22px 45px rgba(15, 23, 42, 0.65);
      }

      h1, h2, h3 {
        margin: 0 0 8px;
      }

      h2 { font-size: 1.25rem; }

      .muted { color: var(--text-muted); }
      .small { font-size: 0.85rem; }

      .btn,
      .btnSecondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 999px;
        font-size: 0.9rem;
        padding: 8px 16px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease, box-shadow 0.15s ease;
        border: 1px solid transparent;
      }

      .btn {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #0b1120;
        border-color: transparent;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(8, 47, 73, 0.75);
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 35px rgba(8, 47, 73, 0.9);
      }

      .btnSecondary {
        background: rgba(15, 23, 42, 0.7);
        color: var(--text-main);
        border-color: #1f2937;
      }

      .btnSecondary:hover {
        background: rgba(15, 23, 42, 0.95);
      }

      input[type="file"] {
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        background: #020617;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      pre {
        background: #020617;
        border-radius: 14px;
        padding: 14px 16px;
        border: 1px solid #1e293b;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 0.9rem;
      }

      code {
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 0.85rem;
        background: rgba(15, 23, 42, 0.9);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="pageShell">
      <header>
        <div class="brand"><a href="/">PowerBI Narrative Backend</a></div>
        <div class="tagline">Prototype · Storytelling from PBIX</div>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
